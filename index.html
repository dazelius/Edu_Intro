<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Understanding Games &amp; Game Design</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" id="theme">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<!-- Language Toggle -->
<button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">EN</button>

<!-- TOC Toggle Button -->
<button id="toc-toggle" class="toc-toggle" aria-label="Table of Contents">☰</button>

<!-- TOC Panel -->
<nav id="toc-panel" class="toc-panel">
  <div class="toc-header">
    <span class="toc-title">Contents</span>
    <button id="toc-close" class="toc-close">&times;</button>
  </div>
  <ul class="toc-list" id="toc-list">
    <li class="toc-section-label">Opening</li>
    <li><a data-slide="0">01 · Title</a></li>

    <li class="toc-section-label">Why This Class?</li>
    <li><a data-slide="1">02 · Why This Class?</a></li>
    <li><a data-slide="2">03 · Growth of the Industry</a></li>
    <li><a data-slide="3">04 · Curse of the Blockbuster</a></li>
    <li><a data-slide="4">05 · The Evidence</a></li>
    <li><a data-slide="5">06 · The Age of AI</a></li>
    <li><a data-slide="6">07 · New Mindset</a></li>

    <li class="toc-section-label">Instructor</li>
    <li><a data-slide="7">08 · Instructor</a></li>
  </ul>
</nav>

<div class="reveal">
  <div class="slides" id="slide-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script>
const slideFiles = [
  'slides/01_title.html',
  'slides/02_why_this_class.html',
  'slides/03_past_hierarchy.html',
  'slides/04_ai_disruption.html',
  'slides/05_blockbuster_cases.html',
  'slides/06_ai_era.html',
  'slides/07_mindset_shift.html',
  'slides/08_instructor.html',
];

(async () => {
  const container = document.getElementById('slide-container');
  const results = await Promise.all(
    slideFiles.map(f => fetch(f).then(r => r.ok ? r.text() : ''))
  );
  container.innerHTML = results.join('\n');

  Reveal.initialize({
    hash: true,
    slideNumber: 'c/t',
    transition: 'slide',
    transitionSpeed: 'default',
    backgroundTransition: 'fade',
    width: 1280,
    height: 720,
    margin: 0.04,
    center: false,
  });

  // TOC interactions
  const panel = document.getElementById('toc-panel');
  const toggle = document.getElementById('toc-toggle');
  const close = document.getElementById('toc-close');
  const links = document.querySelectorAll('#toc-list a[data-slide]');

  toggle.addEventListener('click', () => {
    panel.classList.toggle('open');
    toggle.classList.toggle('hidden');
  });
  close.addEventListener('click', () => {
    panel.classList.remove('open');
    toggle.classList.remove('hidden');
  });

  links.forEach(a => {
    a.addEventListener('click', () => {
      const idx = parseInt(a.dataset.slide, 10);
      Reveal.slide(idx);
      panel.classList.remove('open');
      toggle.classList.remove('hidden');
    });
  });

  // highlight current slide in TOC
  Reveal.on('slidechanged', (e) => {
    links.forEach(a => a.classList.remove('active'));
    const current = document.querySelector(`#toc-list a[data-slide="${e.indexh}"]`);
    if (current) current.classList.add('active');
  });

  // keyboard shortcut: 't' to toggle TOC
  document.addEventListener('keydown', (e) => {
    if (e.key === 't' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      panel.classList.toggle('open');
      toggle.classList.toggle('hidden');
    }
  });

  // Language toggle
  const langBtn = document.getElementById('lang-toggle');
  langBtn.addEventListener('click', () => {
    const html = document.documentElement;
    const isEn = html.getAttribute('data-lang') === 'en';
    html.setAttribute('data-lang', isEn ? 'kr' : 'en');
    html.setAttribute('lang', isEn ? 'ko' : 'en');
    langBtn.textContent = isEn ? 'KR' : 'EN';
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'l' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      langBtn.click();
    }
  });

  // Auto-scroll for career timeline (slide 02)
  function initTimelineScroll() {
    const wrap = document.querySelector('.ct-scroll-wrap');
    const tl = document.getElementById('career-timeline');
    if (!wrap || !tl) return;

    const overflow = tl.scrollHeight - wrap.clientHeight;
    if (overflow > 0) {
      const duration = Math.max(6, overflow / 30);
      tl.style.setProperty('--scroll-distance', `-${overflow}px`);
      tl.style.setProperty('--scroll-duration', `${duration}s`);
    }
  }

  Reveal.on('slidechanged', (e) => {
    const wrap = document.querySelector('.ct-scroll-wrap');
    if (!wrap) return;
    wrap.classList.remove('scrolling');

    // slide index 7 = instructor slide
    if (e.indexh === 7) {
      const tl = document.getElementById('career-timeline');
      if (tl) tl.style.transform = '';
      initTimelineScroll();
      requestAnimationFrame(() => wrap.classList.add('scrolling'));
    }
  });

  // also trigger if we start on slide 7
  if (Reveal.getIndices().h === 7) {
    setTimeout(() => {
      initTimelineScroll();
      const wrap = document.querySelector('.ct-scroll-wrap');
      if (wrap) wrap.classList.add('scrolling');
    }, 500);
  }
})();
</script>
</body>
</html>
