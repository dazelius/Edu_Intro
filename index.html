<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Understanding Games &amp; Game Design</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" id="theme">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<div class="reveal">
  <div class="slides" id="slide-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
<script>
const slideFiles = [
  'slides/01_title.html',
  'slides/02_instructor.html',
  'slides/03_what_is_game.html',
  'slides/04_play_together.html',
  'slides/05_action_result_repeat.html',
  'slides/06_what_is_game_design.html',
  'slides/07_designer_role.html',
  'slides/08_core_loop.html',
  'slides/09_design_intent.html',
  'slides/10_intent_compass.html',
  'slides/11_case_studies.html',
  'slides/12_case_analysis.html',
  'slides/13_exercise.html',
  'slides/14_elevator_pitch.html',
  'slides/15_closing.html',
];

(async () => {
  const container = document.getElementById('slide-container');
  const results = await Promise.all(
    slideFiles.map(f => fetch(f).then(r => r.ok ? r.text() : ''))
  );
  container.innerHTML = results.join('\n');

  Reveal.initialize({
    hash: true,
    slideNumber: 'c/t',
    transition: 'slide',
    transitionSpeed: 'default',
    backgroundTransition: 'fade',
    width: 1280,
    height: 720,
    margin: 0.04,
    center: false,
  });
})();
</script>
</body>
</html>
